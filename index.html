<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Decks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 3rem 0;
            border-bottom: 2px solid #2a2a2a;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 1.25rem;
            color: #888;
        }
        
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .deck-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .deck-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffffff 0%, #888888 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .deck-card:hover {
            transform: translateY(-4px);
            border-color: #ffffff;
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.1);
        }
        
        .deck-card:hover::before {
            opacity: 1;
        }
        
        .deck-title {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            color: #ffffff;
        }
        
        .deck-description {
            color: #b0b0b0;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        
        .deck-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 1.5rem;
        }
        
        .deck-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #ffffff;
            color: #0a0a0a;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .deck-link:hover {
            background-color: #e0e0e0;
            transform: scale(1.05);
        }
        
        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #2a2a2a;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }
        
        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #888;
        }
        
        .empty-state code {
            background: #1a1a1a;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <!-- Update this title to match your presenter name or team -->
            <h1>Slide Decks</h1>
            <p class="subtitle">Presentations powered by Slidev</p>
        </header>
        
        <main>
            <div class="deck-grid">
                <!-- Example deck card — demonstrates all available layouts -->
                <div class="deck-card">
                    <h2 class="deck-title">Example Deck</h2>
                    <div class="deck-meta">
                        <span>📅 Created: 2025-11-24</span>
                    </div>
                    <p class="deck-description">
                        Demonstrates all available layouts: cover, updates, figure, grid-cols, media-grid, code highlighting, and Google Drive media embedding.
                    </p>
                    <a href="./example-deck/" class="deck-link">View Slides →</a>
                </div>

                <!--
                    ADD YOUR DECK CARDS HERE.
                    Copy the block below and fill in the details for each new deck
                    you create with ./create-deck.sh.

                    <div class="deck-card">
                        <h2 class="deck-title">Your Deck Title</h2>
                        <div class="deck-meta">
                            <span>📅 Created: YYYY-MM-DD</span>
                        </div>
                        <p class="deck-description">
                            Short description of what this deck covers.
                        </p>
                        <a href="./your-deck-name/" class="deck-link">View Slides →</a>
                    </div>
                -->
            </div>
        </main>
        
        <footer>
            <p>Built with <a href="https://sli.dev" style="color: #888; text-decoration: underline;">Slidev</a></p>
        </footer>
    </div>
</body>
</html>
