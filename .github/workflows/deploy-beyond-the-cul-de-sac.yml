name: Deploy — Beyond the Cul-de-Sac

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: beyond-the-cul-de-sac
        run: npm install

      - name: Build slides
        working-directory: beyond-the-cul-de-sac
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/beyond-the-cul-de-sac
          cp index.html _site/index.html
          cp 404.html _site/404.html
          cp -r beyond-the-cul-de-sac/dist/. _site/beyond-the-cul-de-sac/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
