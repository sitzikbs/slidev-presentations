<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect solution
    // Store the attempted path in sessionStorage
    sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
    
    // Redirect to the base URL
    location.replace('/REPO_BASE_PLACEHOLDER/DECK_NAME_PLACEHOLDER/');
  </script>
</head>
<body>
</body>
</html>
